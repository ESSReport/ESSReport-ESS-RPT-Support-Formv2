<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Ticket</title>
</head>
<body>

<h2>Support Ticket</h2>

<form id="ticketForm">
  <select name="department" id="type" required>
    <option value="">Select Type</option>
    <option value="Deposit Concern">Deposit Concern</option>
    <option value="Withdrawal Issue">Withdrawal Issue</option>
    <option value="Report Balance Concern">Report Balance Concern</option>
  </select>

  <input name="shopname" placeholder="Shop Name">
  <input name="reference" placeholder="Reference">
  <input name="concern" placeholder="Concern">

  <input type="hidden" name="chatid" id="chatid">

  <button type="submit">Submit</button>
</form>

<script>
// ✅ get chat id
document.getElementById("chatid").value =
  new URLSearchParams(window.location.search).get("chatid");

// ✅ submit
document.getElementById("ticketForm").addEventListener("submit", function(e){
  e.preventDefault();

  const formData = new FormData(this);

  const webAppUrl = "https://script.google.com/macros/s/AKfycby26LO-8UcTT9E-Te_FSwG5BwyXeaC9zIZj4DB5QmbQ8xlcc7d5wLbKewuySfyldUC4YA/exec"; // 🔥 replace

  fetch(webAppUrl, {
    method: "POST",
    body: formData
  })
  .then(res => res.text())
  .then(res => {
    if(res.includes("success")){
      document.body.innerHTML = "<h2>✅ Ticket Submitted</h2>";
    } else {
      alert(res);
    }
  })
  .catch(err => alert(err));
});
</script>

</body>
</html>
